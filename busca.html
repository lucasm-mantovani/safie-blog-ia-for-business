<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Busca — SAFIE IA for Business</title>
  <meta name="description" content="Busque artigos sobre direito e contabilidade para empresas de IA e tecnologia no Brasil.">
  <link rel="canonical" href="https://ia.safie.blog.br/busca.html">
  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="/assets/css/estilo.css">
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="SAFIE IA for Business — Página inicial">
      <span class="logo-marca">SAFIE <span>IA</span></span>
      <span class="logo-sub">Direito &amp; Contabilidade</span>
    </a>
    <nav id="nav-principal" class="nav-principal" aria-label="Navegação principal">
      <a href="/">Home</a>
      <a href="/temas/">Temas</a>
      <a href="/sobre.html">Sobre</a>
      <a href="/busca.html" class="ativo">Busca</a>
    </nav>
    <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>
  <div class="busca-wrapper">
    <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px;letter-spacing:-0.03em;">Buscar artigos</h1>
    <p style="color:var(--cinza);margin-bottom:28px;">Digite um termo para encontrar artigos sobre regulação de IA, LGPD, tributação, contratos e investimento em tecnologia.</p>

    <form id="form-busca" class="busca-form" role="search" aria-label="Busca de artigos">
      <input
        type="search"
        id="input-busca"
        name="q"
        placeholder="Ex: PL 2338, AI Act, LGPD, responsabilidade civil IA..."
        autocomplete="off"
        aria-label="Buscar artigos">
      <button type="submit">Buscar</button>
    </form>

    <p id="contagem-resultados" style="font-size:0.85rem;color:var(--cinza);margin-bottom:20px;"></p>

    <div id="resultados-busca"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">SAFIE <span>IA</span></div>
    <nav class="footer-links">
      <a href="/">Home</a>
      <a href="/temas/">Temas</a>
      <a href="/sobre.html">Sobre</a>
      <a href="/busca.html">Busca</a>
      <a href="https://safie.com.br" target="_blank" rel="noopener">safie.com.br</a>
    </nav>
    <p class="footer-copy">
      © 2026 <a href="https://safie.com.br" target="_blank" rel="noopener">SAFIE</a>
    </p>
  </div>
</footer>

<script src="/assets/js/busca.js"></script>
</body>
</html>
